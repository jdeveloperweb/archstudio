server:
  port: 8090
  forward-headers-strategy: framework

spring:
  application:
    name: archstudio-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/archstudio}
    username: ${SPRING_DATASOURCE_USERNAME:archstudio}
    password: ${SPRING_DATASOURCE_PASSWORD:archstudio}
  jpa:
    hibernate:
      # Flyway owns the schema (V1__init.sql). 'none' avoids validate false-positives
      # on citext / jsonb / timestamptz columns and guarantees a clean startup.
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

app:
  jwt-secret: ${APP_JWT_SECRET:dev-only-secret-change-me-please-32b!!}
  enc-key: ${APP_ENC_KEY:}
  public-url: ${APP_PUBLIC_URL:http://localhost:3000}
  cookie-secure: ${APP_COOKIE_SECURE:false}
  cookie-name: as_session
  jwt-ttl-days: 7
  mail-enabled: ${MAIL_ENABLED:false}
  mail-from: ${MAIL_FROM:ArchStudio <no-reply@localhost>}

management:
  endpoints:
    web:
      exposure:
        include: health
  health:
    mail:
      enabled: false   # SMTP being unconfigured must not mark the service unhealthy

logging:
  level:
    org.springframework.security: INFO
