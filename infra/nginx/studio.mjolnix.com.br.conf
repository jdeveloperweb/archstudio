# ArchStudio platform — studio.mjolnix.com.br
# Install to /etc/nginx/conf.d/ then run certbot --nginx -d studio.mjolnix.com.br
server {
    server_name studio.mjolnix.com.br;

    client_max_body_size 8m;

    # Security headers (SAMEORIGIN keeps the same-origin canvas iframe working)
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API -> Spring Boot (strip nothing; API is mounted at /api/v1)
    location /api/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # AI calls can be slow
    }

    # Everything else -> Next.js
    location / {
        proxy_pass http://127.0.0.1:3020;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/studio.access.log;
    error_log  /var/log/nginx/studio.error.log;

    listen 80;
}
