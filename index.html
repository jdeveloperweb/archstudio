<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArchStudio — Editor de Arquitetura</title>
<meta name="description" content="ArchStudio — editor de diagramas de arquitetura de software no navegador, feito para humanos e agentes de IA. Um único arquivo HTML, zero dependências, funciona offline.">
<meta property="og:title" content="ArchStudio — Architecture diagrams, AI-native">
<meta property="og:description" content="Draw software architecture diagrams in the browser. Single HTML file, zero dependencies, JSON spec with auto-layout for AI agents, shareable links.">
<meta property="og:url" content="https://archstudio.mjolnix.com.br">
<meta property="og:image" content="https://archstudio.mjolnix.com.br/og.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><rect width="24" height="24" rx="5" fill="%230e1017"/><path d="M12 4.5l6.5 3.75v7.5L12 19.5l-6.5-3.75v-7.5z" fill="none" stroke="%23a679ff" stroke-width="1.8" stroke-linejoin="round"/><path d="M8.8 12h6.4M12.4 9.6L14.8 12l-2.4 2.4" stroke="%23a679ff" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>'>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Patrick+Hand&family=Inter:wght@400;600;700&family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e1017;--panel:#151824;--panel2:#1c2032;--border:#2a2f47;
  --ink:#e6e8f2;--dim:#8f94ad;--accent:#a679ff;
  --aws:#ff9900;--client:#7c9eff;--gen:#a679ff;--onprem:#9aa3b5;--sless:#4ade80;--red:#f87171;
  --nodebg:#1a1d2e;--gridline:rgba(166,121,255,.05);--shadow:rgba(0,0,0,.4);--edge:#6b72a3;
  --mono:'Cascadia Code','JetBrains Mono',Consolas,monospace;
  --sans:'Segoe UI',system-ui,sans-serif;
}
body[data-theme="light"]{
  --bg:#f2f3f9;--panel:#ffffff;--panel2:#eceef7;--border:#d5d9ea;
  --ink:#1d2030;--dim:#6a7089;--accent:#7c4dff;
  --aws:#e68a00;--client:#3b6fe0;--gen:#7c4dff;--onprem:#5c6478;--sless:#0f9d58;--red:#d9534f;
  --nodebg:#ffffff;--gridline:rgba(90,70,180,.08);--shadow:rgba(40,45,80,.14);--edge:#8a90b8;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;height:100vh;overflow:hidden;transition:background .2s}
.topbar{height:54px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;padding:0 12px;overflow-x:auto}
.logo{font-family:var(--mono);font-weight:700;font-size:16px;white-space:nowrap}
.logo .kw{color:var(--accent)}
.title-input{background:var(--panel2);border:1px solid var(--border);color:var(--ink);border-radius:7px;padding:7px 12px;font-size:14px;min-width:100px;max-width:230px;flex:1}
.title-input:focus{outline:none;border-color:var(--accent)}
.mode-btn,.tool-btn,.zoom-btn{font-family:var(--mono);font-size:12px;border-radius:6px;padding:7px 10px;cursor:pointer;border:1px solid var(--border);background:var(--panel2);color:var(--dim);white-space:nowrap}
.mode-btn.active{border-color:var(--accent);color:var(--accent);background:color-mix(in srgb,var(--accent) 12%,transparent)}
.tool-btn{color:var(--ink)}
.tool-btn:hover,.zoom-btn:hover{border-color:var(--accent)}
.tool-btn.primary{background:var(--accent);color:#fff;border:none;font-weight:700}
.zoom-group{display:flex;align-items:center;gap:3px}
.zoom-pct{font-family:var(--mono);font-size:11.5px;color:var(--dim);min-width:42px;text-align:center;cursor:pointer}
.chk{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--dim);white-space:nowrap;cursor:pointer;user-select:none}
.hintbar{height:24px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px}
.hint{font-size:11px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.propsbar{min-height:0;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;padding:0 12px;overflow-x:auto;transition:min-height .15s}
.propsbar.show{min-height:42px}
.props-label{font-family:var(--mono);font-size:11px;color:var(--accent);white-space:nowrap;margin-right:4px}
.pbtn{font-family:var(--mono);font-size:11.5px;border-radius:6px;padding:5px 10px;cursor:pointer;border:1px solid var(--border);background:var(--panel2);color:var(--ink);white-space:nowrap}
.pbtn:hover{border-color:var(--accent)}
.pbtn.danger:hover{border-color:var(--red);color:var(--red)}
.pbtn.on{border-color:var(--accent);color:var(--accent)}

.layout{display:flex;height:calc(100vh - 78px)}
.propsbar.show ~ .layout{height:calc(100vh - 120px)}
.palette{width:232px;min-width:232px;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;padding:8px}
.pal-search{width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--ink);border-radius:7px;padding:7px 10px;font-size:12.5px;margin-bottom:8px}
.pal-search:focus{outline:none;border-color:var(--accent)}
.pal-cat{font-family:var(--mono);font-size:10px;letter-spacing:1.2px;color:var(--dim);text-transform:uppercase;padding:10px 6px 5px;cursor:pointer;user-select:none}
.pal-cat::before{content:"▾ "}
.pal-cat.closed::before{content:"▸ "}
.pal-cat.closed + .pal-group{display:none}
.pal-item{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:12px;color:var(--ink);border:1px solid var(--border);margin-bottom:4px;background:var(--panel2);user-select:none}
.pal-item:hover{border-color:var(--accent)}
.pal-item .picon{width:20px;height:20px;flex-shrink:0}
.picon svg,.nicon svg{width:100%;height:100%;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.i-aws{color:var(--aws)} .i-client{color:var(--client)} .i-gen{color:var(--gen)} .i-onprem{color:var(--onprem)} .i-sless{color:var(--sless)}

.center{flex:1;min-width:0}
.canvas-outer{height:100%;overflow:auto;background:
  linear-gradient(var(--gridline) 1px,transparent 1px),
  linear-gradient(90deg,var(--gridline) 1px,transparent 1px);
  background-size:28px 28px}
.canvas{position:relative;width:2200px;height:1500px;transform-origin:0 0}
.canvas svg.edges{position:absolute;inset:0;width:100%;height:100%;z-index:2;pointer-events:none}
.edge{stroke:var(--edge);fill:none;cursor:pointer;pointer-events:stroke}
.edge:hover{stroke:var(--red)}
.edge.sel{stroke:var(--accent)!important}
.edge-label{font-family:var(--sans);font-size:11px;fill:var(--ink);paint-order:stroke;stroke:var(--bg);stroke-width:4;cursor:pointer;pointer-events:all}
.temp-edge{stroke:var(--accent)!important;stroke-dasharray:6 4;pointer-events:none!important}
.ah{fill:var(--accent);stroke:var(--bg);stroke-width:2;cursor:grab;pointer-events:all}

.gbox{position:absolute;border:2px dashed;border-radius:14px;z-index:1;cursor:grab;touch-action:none}
.gbox .gtitle{position:absolute;top:-11px;left:14px;font-family:var(--mono);font-size:11.5px;font-weight:700;background:var(--bg);padding:1px 9px;border-radius:5px;white-space:nowrap}
.gbox .bres{position:absolute;right:-2px;bottom:-2px;width:16px;height:16px;border-radius:4px;cursor:nwse-resize;border:2px solid var(--bg)}
.gbox .nx{position:absolute;top:-9px;right:-9px;width:19px;height:19px;border-radius:50%;background:var(--panel2);border:1px solid var(--border);color:var(--dim);font-size:10px;line-height:17px;cursor:pointer;display:none;text-align:center}
.gbox:hover .nx{display:block}
.gbox.sel{border-style:solid;box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 35%,transparent)}

.ftext{position:absolute;z-index:3;font-family:var(--sans);color:var(--ink);cursor:grab;user-select:none;touch-action:none;white-space:pre-wrap;max-width:420px;line-height:1.35}
.ftext.sel{outline:1.5px dashed var(--accent);outline-offset:4px}

.node{position:absolute;background:var(--nodebg);border:1px solid var(--border);border-radius:11px;text-align:center;cursor:grab;user-select:none;touch-action:none;box-shadow:0 3px 14px var(--shadow);z-index:4}
.node:active{cursor:grabbing}
.node .nicon{display:inline-block}
.node .nname{line-height:1.3;display:block;color:var(--ink);word-wrap:break-word}
.node .nx{position:absolute;top:-8px;right:-8px;width:18px;height:18px;border-radius:50%;background:var(--panel2);border:1px solid var(--border);color:var(--dim);font-size:10px;line-height:16px;cursor:pointer;display:none;text-align:center;z-index:5}
.node:hover .nx{display:block}
.node .nx:hover{color:var(--red);border-color:var(--red)}
.node .port{position:absolute;right:-8px;top:50%;transform:translateY(-50%);width:15px;height:15px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);cursor:crosshair;opacity:.9;z-index:5}
.node .port:hover{transform:translateY(-50%) scale(1.3)}
.node.b-aws{border-top:3px solid var(--aws)}
.node.b-client{border-top:3px solid var(--client)}
.node.b-gen{border-top:3px solid var(--gen)}
.node.b-onprem{border-top:3px solid var(--onprem)}
.node.b-sless{border-top:3px solid var(--sless)}
.node.sel{outline:2px solid var(--accent);outline-offset:2px}

.canvas{--dfont:'Segoe UI',system-ui,sans-serif}
.nname,.gtitle,.ftext,.edge-label{font-family:var(--dfont)}
.node.st-icon{background:transparent;border:none!important;box-shadow:none;border-radius:0}
.node .nres{position:absolute;right:-7px;bottom:-7px;width:14px;height:14px;border-radius:4px;background:var(--accent);border:2px solid var(--bg);cursor:nwse-resize;display:none;z-index:5}
.node.sel .nres{display:block}
select.tool-btn{appearance:auto}
.modal{position:fixed;inset:0;background:rgba(8,9,14,.82);display:none;z-index:100;overflow-y:auto;padding:28px 14px}
.modal.show{display:block}
.mcard{max-width:880px;margin:0 auto;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:24px 28px}
.mcard h2{font-size:19px;margin-bottom:4px}
.mcard .sub{font-size:13px;color:var(--dim);line-height:1.5}
.mcard h3{font-family:var(--mono);text-transform:uppercase;letter-spacing:1px;font-size:11.5px;color:var(--accent);margin:18px 0 8px}
.mcard p, .mcard li{font-size:13.5px;line-height:1.6;color:var(--ink)}
.mcard ul{padding-left:20px}
.tpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(245px,1fr));gap:10px;margin-top:14px}
.tpl-card{border:1px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;background:var(--panel2)}
.tpl-card:hover{border-color:var(--accent)}
.tpl-card h4{font-size:13.5px;margin:3px 0 5px;color:var(--ink)}
.tpl-card p{font-size:11.5px;color:var(--dim);line-height:1.45;margin:0}
.tpl-tag{font-family:var(--mono);font-size:9px;color:var(--accent);letter-spacing:.8px}
pre.schema{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-family:var(--mono);font-size:11px;line-height:1.55;overflow-x:auto;white-space:pre-wrap;color:#c9cde3;margin:8px 0}
body[data-theme="light"] pre.schema{color:#3a3f58}
@media(max-width:900px){
  body{overflow:auto}
  .layout{flex-direction:column;height:auto!important}
  .palette{width:100%;min-width:0;max-height:210px;border-right:none;border-bottom:1px solid var(--border)}
  .canvas-outer{height:68vh}
  .title-input{min-width:60px}
}
</style>
</head>
<body data-theme="dark">
<div class="topbar">
  <div class="logo"><span class="kw">ArchStudio</span></div>
  <input class="title-input" id="diagTitle" placeholder="Nome do diagrama..." value="Minha Arquitetura">
  <button class="mode-btn active" id="modeMove" onclick="setMode('move')">✥ Mover</button>
  <button class="mode-btn" id="modeConn" onclick="setMode('connect')">→ Conectar</button>
  <button class="tool-btn" onclick="addBox()">▭ Caixa</button>
  <button class="tool-btn" onclick="addArrow()">↗ Seta livre</button>
  <button class="tool-btn" onclick="addText()">T Texto</button>
  <button class="tool-btn" onclick="undo()" title="Ctrl+Z">↩</button>
  <button class="tool-btn" onclick="redo()" title="Ctrl+Y">↪</button>
  <button class="tool-btn" onclick="openTemplates()">📋 Modelos</button>
  <button class="tool-btn" onclick="openAgent()">🤖 Agente</button>
  <select class="tool-btn" id="fontSel" onchange="setFont(this.value)" title="fonte do diagrama"></select>
  <div class="zoom-group">
    <button class="zoom-btn" onclick="setZoom(zoom-0.1)">−</button>
    <span class="zoom-pct" id="zoomPct" onclick="setZoom(1)" title="clique para 100%">100%</span>
    <button class="zoom-btn" onclick="setZoom(zoom+0.1)">+</button>
  </div>
  <label class="chk"><input type="checkbox" id="snapChk" checked> imã</label>
  <button class="tool-btn" id="themeBtn" onclick="toggleTheme()">☀ Claro</button>
  <button class="tool-btn" onclick="saveFile()">💾 Salvar</button>
  <button class="tool-btn" onclick="document.getElementById('fileInput').click()">📂 Carregar</button>
  <button class="tool-btn" onclick="shareLink(this)" title="copia um link que abre este diagrama">🔗 Link</button>
  <button class="tool-btn" onclick="exportSvg()">⬇ SVG</button>
  <button class="tool-btn primary" onclick="exportPng()">⬇ PNG</button>
  <button class="tool-btn" onclick="if(confirm('Limpar todo o diagrama?')){pushUndo();clearCanvas()}">Limpar</button>
  <a class="tool-btn" href="https://github.com/jdeveloperweb/archstudio" target="_blank" rel="noopener" style="text-decoration:none" title="código-fonte no GitHub">★ GitHub</a>
  <input type="file" id="fileInput" accept=".json,application/json" style="display:none">
</div>
<div class="modal" id="modal" onclick="if(event.target===this)closeModal()"></div>
<div style="display:none">
</div>
<div class="hintbar"><span class="hint">Clique seleciona (barra de propriedades aparece) · arraste para mover · pontinho roxo conecta · caixas carregam o que está dentro · duplo-clique renomeia · Delete apaga a seleção · Ctrl+Z desfaz · Ctrl+scroll = zoom</span></div>
<div class="propsbar" id="propsBar"></div>
<div class="layout">
  <div class="palette">
    <input class="pal-search" placeholder="🔍 buscar componente..." oninput="renderPalette(this.value)">
    <div id="palHost"></div>
  </div>
  <div class="center">
    <div class="canvas-outer" id="canvasOuter">
      <div class="canvas" id="canvas">
        <svg class="edges" id="edgeLayer">
          <defs>
            <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="var(--edge)"/></marker>
            <marker id="arrowA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent)"/></marker>
          </defs>
        </svg>
      </div>
    </div>
  </div>
</div>

/* ============ ESTADO ============ */
let mode='move', zoom=1, connSrc=null, sel=null, fontId='system';
const FONTS=[
 {id:'system', n:'Fonte: Sistema',        css:"'Segoe UI',system-ui,sans-serif"},

 {id:'mono',   n:'Fonte: JetBrains Mono', css:"'JetBrains Mono',monospace",  g:'JetBrains+Mono:wght@400;700'}];
const fontCache={};
function curFont(){ return FONTS.find(f=>f.id===fontId)||FONTS[0]; }
function setFont(id){ fontId=id; canvas.style.setProperty('--dfont', curFont().css); document.getElementById('fontSel').value=id; persist(); }
let state = { seq:0, nodes:[], edges:[], boxes:[], arrows:[], texts:[] };
let undoStack=[], redoStack=[];
const BOX_COLORS = ['#a679ff','#ff9900','#7c9eff','#4ade80','#9aa3b5','#f87171'];
const canvas=document.getElementById('canvas'), canvasOuter=document.getElementById('canvasOuter'), edgeLayer=document.getElementById('edgeLayer');
const SVGNS='http://www.w3.org/2000/svg';
const snapOn = () => document.getElementById('snapChk').checked;
const gsnap = v => snapOn() ? Math.round(v/14)*14 : Math.round(v);
const theme = () => document.body.dataset.theme;
const catColor = c => (theme()==='light'?CAT_COLORS_L:CAT_COLORS_D)[c]||'#a679ff';

function persist(){ store.set('as_doc', JSON.stringify({format:'archstudio',version:3,name:document.getElementById('diagTitle').value,theme:theme(),font:fontId,state})); }
document.getElementById('diagTitle').addEventListener('input', persist);
function pushUndo(){ undoStack.push(JSON.stringify(state)); if(undoStack.length>60) undoStack.shift(); redoStack.length=0; }
function undo(){ if(!undoStack.length) return; redoStack.push(JSON.stringify(state)); state=JSON.parse(undoStack.pop()); sel=null; connSrc=null; persist(); renderAll(); }
function redo(){ if(!redoStack.length) return; undoStack.push(JSON.stringify(state)); state=JSON.parse(redoStack.pop()); sel=null; persist(); renderAll(); }

/* ============ TEMA / ZOOM ============ */
function toggleTheme(){
  const t = theme()==='dark'?'light':'dark';
  document.body.dataset.theme=t;
  document.getElementById('themeBtn').textContent = t==='dark'?'☀ Claro':'🌙 Escuro';
  persist();
}
function setZoom(z){
  zoom=Math.max(0.4,Math.min(2,Math.round(z*10)/10));
  canvas.style.transform=`scale(${zoom})`;
  document.getElementById('zoomPct').textContent=Math.round(zoom*100)+'%';
}
canvasOuter.addEventListener('wheel',ev=>{ if(!ev.ctrlKey)return; ev.preventDefault(); setZoom(zoom+(ev.deltaY<0?0.1:-0.1)); },{passive:false});

/* ============ PALETA ============ */
function iconSvg(name){ return `<svg viewBox="0 0 24 24">${ICONS[name]||ICONS.hexagon}</svg>`; }
function renderPalette(filter=''){
  const f=filter.trim().toLowerCase();
  document.getElementById('palHost').innerHTML = CATALOG.map(g=>{
    const items=g.items.filter(it=>!f||it.n.toLowerCase().includes(f)||it.t.includes(f));
    if(!items.length) return '';
    return `<div class="pal-cat" onclick="this.classList.toggle('closed')">${g.cat}</div><div class="pal-group">`+
      items.map(it=>`<div class="pal-item" onclick="addNode('${it.t}')"><span class="picon i-${g.color}">${iconSvg(it.i)}</span>${it.n}</div>`).join('')+'</div>';
  }).join('');
}

/* ============ CRIAÇÃO ============ */
function viewCenter(){ return { x:(canvasOuter.scrollLeft+canvasOuter.clientWidth/2)/zoom, y:(canvasOuter.scrollTop+canvasOuter.clientHeight/2)/zoom }; }
function addNode(type){
  pushUndo();
  const def=TYPE_INDEX[type], c=viewCenter();
  state.nodes.push({ id:++state.seq, type, label:def.n, s:1,
    x:gsnap(c.x-59+((state.seq*37)%160)-80), y:gsnap(c.y-33+((state.seq*53)%120)-60) });
  persist(); renderAll();
}
function addBox(){
  pushUndo();
  const c=viewCenter();
  state.boxes.push({ id:++state.seq, x:gsnap(c.x-180), y:gsnap(c.y-120), w:360, h:240,
    label:'Nova seção', color:BOX_COLORS[state.boxes.length%BOX_COLORS.length] });
  sel={kind:'box',id:state.seq};
  persist(); renderAll();
}
function addArrow(){
  pushUndo();
  const c=viewCenter();
  state.arrows.push({ id:++state.seq, x1:gsnap(c.x-90), y1:gsnap(c.y), x2:gsnap(c.x+90), y2:gsnap(c.y),
    dash:false, heads:'end', w:2, label:'' });
  sel={kind:'arrow',id:state.seq};
  persist(); renderAll();
}
function addText(){
  pushUndo();
  const c=viewCenter();
  const txt = prompt('Texto da anotação:', 'Anotação');
  if(txt===null) { undoStack.pop(); return; }
  state.texts.push({ id:++state.seq, x:gsnap(c.x-60), y:gsnap(c.y-10), text:txt||'...', size:14 });
  sel={kind:'text',id:state.seq};
  persist(); renderAll();
}
function clearCanvas(){ state={seq:0,nodes:[],edges:[],boxes:[],arrows:[],texts:[]}; sel=null; connSrc=null; persist(); renderAll(); }
function setMode(m){
  mode=m; connSrc=null;
  document.getElementById('modeMove').classList.toggle('active',m==='move');
  document.getElementById('modeConn').classList.toggle('active',m==='connect');
  renderAll();
}
function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ============ GEOMETRIA ============ */
const nodeW = n => 118*(n.s||1), nodeH = n => 66*(n.s||1);
const centerOf = n => ({ x:n.x+nodeW(n)/2, y:n.y+nodeH(n)/2 });
function trimLine(ca,cb,ta,tb){
  const dx=cb.x-ca.x,dy=cb.y-ca.y,len=Math.hypot(dx,dy)||1,ux=dx/len,uy=dy/len;
  return {x1:ca.x+ux*ta,y1:ca.y+uy*ta*0.72,x2:cb.x-ux*tb,y2:cb.y-uy*tb*0.68};
}

/* ============ RENDER ============ */
function renderAll(){
  canvas.querySelectorAll('.node,.gbox,.ftext').forEach(el=>el.remove());
  for(const b of state.boxes){
    const el=document.createElement('div');
    el.className='gbox'+(sel&&sel.kind==='box'&&sel.id===b.id?' sel':'');
    el.style.cssText=`left:${b.x}px;top:${b.y}px;width:${b.w}px;height:${b.h}px;border-color:${b.color};background:${b.color}0d`;
    el.dataset.id=b.id;
    el.innerHTML=`<span class="gtitle" style="color:${b.color}">${escapeHtml(b.label)}</span><span class="bres" style="background:${b.color}"></span><span class="nx" title="remover caixa (mantém o conteúdo)">✕</span>`;
    el.addEventListener('dblclick',()=>renameBox(b.id));
    canvas.appendChild(el);
  }
  for(const t of state.texts){
    const el=document.createElement('div');
    el.className='ftext'+(sel&&sel.kind==='text'&&sel.id===t.id?' sel':'');
    el.style.cssText=`left:${t.x}px;top:${t.y}px;font-size:${t.size}px`;
    el.dataset.id=t.id;
    el.textContent=t.text;
    el.addEventListener('dblclick',()=>editText(t.id));
    canvas.appendChild(el);
  }
  for(const n of state.nodes){
    const def=TYPE_INDEX[n.type]||{i:'hexagon',color:'gen'};
    const s=n.s||1, ic = n.st==='icon';
    const el=document.createElement('div');
    el.className=`node b-${def.color}`+(ic?' st-icon':'')+(connSrc===n.id?' sel':'')+(sel&&sel.kind==='node'&&sel.id===n.id?' sel':'');
    el.style.cssText=`left:${n.x}px;top:${n.y}px;width:${nodeW(n)}px;padding:${(ic?4:10)*s}px 6px ${(ic?4:8)*s}px`;
    el.dataset.id=n.id;
    el.innerHTML=`<span class="nicon i-${def.color}" style="width:${(ic?42:30)*s}px;height:${(ic?42:30)*s}px">${iconSvg(def.i)}</span><span class="nname" style="font-size:${Math.max(9,(ic?12:11)*s)}px;margin-top:${(ic?2:5)*s}px">${escapeHtml(n.label)}</span><span class="nx" title="remover">✕</span><span class="port" title="arraste até outro componente para conectar"></span><span class="nres" title="arraste para redimensionar"></span>`;
    el.addEventListener('dblclick',()=>renameNode(n.id));
    canvas.appendChild(el);
  }
  renderEdges();
  renderProps();
}
function mkPath(cls,d,dash,w,heads,isSel){
  const p=document.createElementNS(SVGNS,'path');
  p.setAttribute('class',cls);
  p.setAttribute('d',d);
  p.setAttribute('stroke-width',w||2);
  if(dash) p.setAttribute('stroke-dasharray','8 6');
  const m = isSel?'url(#arrowA)':'url(#arrow)';
  if(heads==='end'||heads==='both') p.setAttribute('marker-end',m);
  if(heads==='both') p.setAttribute('marker-start',m);
  return p;
}
function edgeLabelEl(x,y,txt){
  const t=document.createElementNS(SVGNS,'text');
  t.setAttribute('class','edge-label');
  t.setAttribute('x',x); t.setAttribute('y',y-7);
  t.setAttribute('text-anchor','middle');
  t.textContent=txt;
  return t;
}
function renderEdges(){
  edgeLayer.querySelectorAll('path.edge,text.edge-label,circle.ah').forEach(p=>p.remove());
  for(const e of state.edges){
    const a=state.nodes.find(n=>n.id===e.from), b=state.nodes.find(n=>n.id===e.to);
    if(!a||!b) continue;
    const isSel = sel&&sel.kind==='edge'&&sel.id===e.id;
    const L=trimLine(centerOf(a),centerOf(b),52*(a.s||1),68*(b.s||1));
    const p=mkPath('edge'+(isSel?' sel':''),`M ${L.x1} ${L.y1} L ${L.x2} ${L.y2}`,e.dash,e.w,e.heads??'end',isSel);
    p.addEventListener('pointerdown',ev=>{ev.stopPropagation();sel={kind:'edge',id:e.id};renderAll();});
    edgeLayer.appendChild(p);
    if(e.label) { const lb=edgeLabelEl((L.x1+L.x2)/2,(L.y1+L.y2)/2,e.label); lb.addEventListener('pointerdown',ev=>{ev.stopPropagation();sel={kind:'edge',id:e.id};renderAll();}); edgeLayer.appendChild(lb); }
  }
  for(const a of state.arrows){
    const isSel = sel&&sel.kind==='arrow'&&sel.id===a.id;
    const p=mkPath('edge'+(isSel?' sel':''),`M ${a.x1} ${a.y1} L ${a.x2} ${a.y2}`,a.dash,a.w,a.heads,isSel);
    p.addEventListener('pointerdown',ev=>{ev.stopPropagation();sel={kind:'arrow',id:a.id};renderAll();});
    edgeLayer.appendChild(p);
    if(a.label){ const lb=edgeLabelEl((a.x1+a.x2)/2,(a.y1+a.y2)/2,a.label); lb.addEventListener('pointerdown',ev=>{ev.stopPropagation();sel={kind:'arrow',id:a.id};renderAll();}); edgeLayer.appendChild(lb); }
    if(isSel){
      for(const end of [1,2]){
        const h=document.createElementNS(SVGNS,'circle');
        h.setAttribute('class','ah'); h.setAttribute('r',7);
        h.setAttribute('cx',a['x'+end]); h.setAttribute('cy',a['y'+end]);
        h.dataset.arrow=a.id; h.dataset.end=end;
        edgeLayer.appendChild(h);
      }
    }
  }
}

/* ============ PAINEL DE PROPRIEDADES ============ */
function selRef(){
  if(!sel) return null;
  const map={node:'nodes',box:'boxes',arrow:'arrows',edge:'edges',text:'texts'};
  return state[map[sel.kind]].find(o=>o.id===sel.id)||null;
}
function renderProps(){
  const bar=document.getElementById('propsBar');
  const o=selRef();
  if(!o){ bar.className='propsbar'; bar.innerHTML=''; return; }
  bar.className='propsbar show';
  let html='';
  if(sel.kind==='node'){
    html=`<span class="props-label">◈ ${escapeHtml(o.label)}</span>
      <button class="pbtn" onclick="propScale(-0.1)">− menor</button>
      <button class="pbtn" onclick="propScale(0.1)">+ maior</button>
      <button class="pbtn ${o.st==='icon'?'on':''}" onclick="propStyle()">${o.st==='icon'?'◻ só ícone':'▣ cartão'}</button>
      <button class="pbtn" onclick="propDup()">⧉ duplicar</button>
      <button class="pbtn" onclick="renameNode(${o.id})">✎ renomear</button>
      <span class="props-label" style="color:var(--dim)">ou arraste o quadradinho roxo do canto do componente</span>`;
  } else if(sel.kind==='box'){
    html=`<span class="props-label">▭ ${escapeHtml(o.label)}</span>
      <button class="pbtn" onclick="renameBox(${o.id})">✎ nome</button>
      <button class="pbtn" onclick="propBoxColor()" style="color:${o.color};border-color:${o.color}">● cor</button>
      <span class="props-label" style="color:var(--dim)">arraste o quadradinho do canto para redimensionar · mover a caixa move o conteúdo</span>`;
  } else if(sel.kind==='arrow'||sel.kind==='edge'){
    const tag = sel.kind==='arrow'?'↗ seta livre':'→ conexão';
    html=`<span class="props-label">${tag}</span>
      <button class="pbtn ${o.dash?'on':''}" onclick="propToggleDash()">┄ tracejada</button>
      <button class="pbtn" onclick="propCycleHeads()">ponta: ${ {end:'→',both:'↔',none:'—'}[o.heads??'end'] }</button>
      <button class="pbtn" onclick="propWidth(-0.5)">− fina</button>
      <button class="pbtn" onclick="propWidth(0.5)">+ grossa</button>
      <button class="pbtn ${o.label?'on':''}" onclick="propEdgeLabel()">✎ rótulo</button>
      ${sel.kind==='arrow'?'<span class="props-label" style="color:var(--dim)">arraste as bolinhas das pontas para posicionar/esticar</span>':''}`;
  } else if(sel.kind==='text'){
    html=`<span class="props-label">T texto</span>
      <button class="pbtn" onclick="propTextSize(-2)">A−</button>
      <button class="pbtn" onclick="propTextSize(2)">A+</button>
      <button class="pbtn" onclick="editText(${o.id})">✎ editar</button>`;
  }
  html+=`<button class="pbtn danger" onclick="delSel()">🗑 excluir</button>
    <button class="pbtn" onclick="sel=null;renderAll()">fechar</button>`;
  bar.innerHTML=html;
}
function propStyle(){ const o=selRef(); if(!o)return; pushUndo(); o.st = o.st==='icon' ? 'card' : 'icon'; persist(); renderAll(); }
function propScale(d){ const o=selRef(); if(!o)return; pushUndo(); o.s=Math.max(0.6,Math.min(1.8,Math.round(((o.s||1)+d)*10)/10)); persist(); renderAll(); }
function propDup(){ const o=selRef(); if(!o)return; pushUndo(); const c={...o,id:++state.seq,x:o.x+30,y:o.y+30}; state.nodes.push(c); sel={kind:'node',id:c.id}; persist(); renderAll(); }
function propBoxColor(){ const o=selRef(); if(!o)return; pushUndo(); o.color=BOX_COLORS[(BOX_COLORS.indexOf(o.color)+1)%BOX_COLORS.length]; persist(); renderAll(); }

function propTextSize(d){ const o=selRef(); if(!o)return; pushUndo(); o.size=Math.max(10,Math.min(34,(o.size||14)+d)); persist(); renderAll(); }
function delSel(){
  const o=selRef(); if(!o)return;
  pushUndo();
  if(sel.kind==='node'){ state.nodes=state.nodes.filter(n=>n.id!==o.id); state.edges=state.edges.filter(e=>e.from!==o.id&&e.to!==o.id); }
  else if(sel.kind==='box') state.boxes=state.boxes.filter(b=>b.id!==o.id);
  else if(sel.kind==='arrow') state.arrows=state.arrows.filter(a=>a.id!==o.id);
  else if(sel.kind==='edge') state.edges=state.edges.filter(e=>e.id!==o.id);
  else if(sel.kind==='text') state.texts=state.texts.filter(t=>t.id!==o.id);

function renameNode(id){ const n=state.nodes.find(x=>x.id===id); const v=prompt('Nome deste componente:',n.label); if(v!==null&&v.trim()){ pushUndo(); n.label=v.trim().slice(0,42); persist(); renderAll(); } }
function renameBox(id){ const b=state.boxes.find(x=>x.id===id); const v=prompt('Nome da seção:',b.label); if(v!==null&&v.trim()){ pushUndo(); b.label=v.trim().slice(0,40); persist(); renderAll(); } }
function editText(id){ const t=state.texts.find(x=>x.id===id); const v=prompt('Texto:',t.text); if(v!==null&&v.trim()){ pushUndo(); t.text=v.trim().slice(0,300); persist(); renderAll(); } }

/* ============ INTERAÇÃO ============ */
function canvasPoint(ev){ const r=canvas.getBoundingClientRect(); return {x:(ev.clientX-r.left)/zoom,y:(ev.clientY-r.top)/zoom}; }
function dragSession(onMove,onUp){
  const move=e2=>onMove(e2);
  const up=e2=>{ document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',up); onUp&&onUp(e2); persist(); renderAll(); };
  document.addEventListener('pointermove',move);
  document.addEventListener('pointerup',up);
}

canvas.addEventListener('pointerdown', ev=>{
  const t=ev.target;
  /* alça de ponta de seta livre */
  if(t.classList&&t.classList.contains('ah')){
    ev.preventDefault();
    const a=state.arrows.find(x=>x.id===+t.dataset.arrow), end=t.dataset.end;
    pushUndo();
    dragSession(e2=>{ const p=canvasPoint(e2); a['x'+end]=gsnap(p.x); a['y'+end]=gsnap(p.y); renderEdges(); });
    return;
  }
  const boxEl=t.closest&&t.closest('.gbox');
  const nodeEl=t.closest&&t.closest('.node');
  const textEl=t.closest&&t.closest('.ftext');
  /* remover */
  if(t.closest&&t.closest('.nx')){
    ev.preventDefault(); pushUndo();
    if(nodeEl){ const id=+nodeEl.dataset.id; state.nodes=state.nodes.filter(n=>n.id!==id); state.edges=state.edges.filter(e=>e.from!==id&&e.to!==id); }
    else if(boxEl){ state.boxes=state.boxes.filter(b=>b.id!==+boxEl.dataset.id); }
    sel=null; persist(); renderAll(); return;
  }
  /* porta de conexão */
  if(t.closest&&t.closest('.port') && nodeEl){ ev.preventDefault(); startLink(+nodeEl.dataset.id, ev); return; }
  /* redimensionar caixa */
  if(t.classList&&t.classList.contains('bres') && boxEl){
    ev.preventDefault();
    const b=state.boxes.find(x=>x.id===+boxEl.dataset.id);
    pushUndo(); sel={kind:'box',id:b.id};
    dragSession(e2=>{ const p=canvasPoint(e2); b.w=Math.max(140,gsnap(p.x-b.x)); b.h=Math.max(90,gsnap(p.y-b.y)); boxEl.style.width=b.w+'px'; boxEl.style.height=b.h+'px'; });
    return;
  }
  /* nó */
  if(nodeEl){
    const n=state.nodes.find(x=>x.id===+nodeEl.dataset.id);
    if(t.classList&&t.classList.contains('nres')){
      ev.preventDefault();
      pushUndo(); sel={kind:'node',id:n.id};
      const sx=ev.clientX, s0=n.s||1;
      dragSession(e2=>{
        n.s=Math.max(0.6,Math.min(2.2,Math.round((s0+(e2.clientX-sx)/zoom/110)*20)/20));
        renderAllLight2(n);
      });
      return;
    }
    if(mode==='connect'){
      ev.preventDefault();
      if(connSrc===null) connSrc=n.id;
      else if(connSrc!==n.id){
        if(!state.edges.some(e=>e.from===connSrc&&e.to===n.id)){ pushUndo(); state.edges.push({id:++state.seq,from:connSrc,to:n.id,dash:false,heads:'end',w:2,label:''}); }
        connSrc=null; persist();
      } else connSrc=null;
      renderAll(); return;
    }
    ev.preventDefault();
    sel={kind:'node',id:n.id};
    pushUndo();
    const sx=ev.clientX,sy=ev.clientY,nx0=n.x,ny0=n.y;
    dragSession(e2=>{
      n.x=Math.max(0,Math.min(2200-nodeW(n),gsnap(nx0+(e2.clientX-sx)/zoom)));
      n.y=Math.max(0,Math.min(1500-nodeH(n),gsnap(ny0+(e2.clientY-sy)/zoom)));
      nodeEl.style.left=n.x+'px'; nodeEl.style.top=n.y+'px';
      renderEdges();
    });
    renderAll0nly(nodeEl,n); return;
  }
  /* texto */
  if(textEl){
    ev.preventDefault();
    const tx=state.texts.find(x=>x.id===+textEl.dataset.id);
    sel={kind:'text',id:tx.id};
    pushUndo();
    const sx=ev.clientX,sy=ev.clientY,x0=tx.x,y0=tx.y;
    dragSession(e2=>{ tx.x=gsnap(x0+(e2.clientX-sx)/zoom); tx.y=gsnap(y0+(e2.clientY-sy)/zoom); textEl.style.left=tx.x+'px'; textEl.style.top=tx.y+'px'; });
    return;
  }
  /* caixa (move junto com o conteúdo) */
  if(boxEl){
    ev.preventDefault();
    const b=state.boxes.find(x=>x.id===+boxEl.dataset.id);
    sel={kind:'box',id:b.id};
    pushUndo();
    const inside=state.nodes.filter(n=>{ const c=centerOf(n); return c.x>=b.x&&c.x<=b.x+b.w&&c.y>=b.y&&c.y<=b.y+b.h; })
      .map(n=>({n,x0:n.x,y0:n.y}));
    const insideTx=state.texts.filter(tx=>tx.x>=b.x&&tx.x<=b.x+b.w&&tx.y>=b.y&&tx.y<=b.y+b.h)
      .map(tx=>({tx,x0:tx.x,y0:tx.y}));
    const sx=ev.clientX,sy=ev.clientY,bx0=b.x,by0=b.y;
    dragSession(e2=>{
      const dx=(e2.clientX-sx)/zoom, dy=(e2.clientY-sy)/zoom;
      b.x=gsnap(bx0+dx); b.y=gsnap(by0+dy);
      for(const it of inside){ it.n.x=gsnap(it.x0+dx); it.n.y=gsnap(it.y0+dy); }
      for(const it of insideTx){ it.tx.x=gsnap(it.x0+dx); it.tx.y=gsnap(it.y0+dy); }
      renderAllLight();
    });
    return;
  }
  /* vazio: desseleciona */
  if(sel||connSrc!==null){ sel=null; connSrc=null; renderAll(); }
});
function renderAll0nly(el,n){ el.classList.add('sel'); renderProps(); }
function renderAllLight2(n){
  const el=canvas.querySelector(`.node[data-id="${n.id}"]`);
  if(el){ const s=n.s||1, ic=n.st==='icon';
    el.style.width=nodeW(n)+'px'; el.style.padding=`${(ic?4:10)*s}px 6px ${(ic?4:8)*s}px`;
    const icel=el.querySelector('.nicon'); if(icel){ icel.style.width=((ic?42:30)*s)+'px'; icel.style.height=((ic?42:30)*s)+'px'; }
    const nm=el.querySelector('.nname'); if(nm){ nm.style.fontSize=Math.max(9,(ic?12:11)*s)+'px'; nm.style.marginTop=((ic?2:5)*s)+'px'; }
  }

function renderAllLight(){
  for(const b of state.boxes){ const el=canvas.querySelector(`.gbox[data-id="${b.id}"]`); if(el){ el.style.left=b.x+'px'; el.style.top=b.y+'px'; } }
  for(const n of state.nodes){ const el=canvas.querySelector(`.node[data-id="${n.id}"]`); if(el){ el.style.left=n.x+'px'; el.style.top=n.y+'px'; } }
  for(const t of state.texts){ const el=canvas.querySelector(`.ftext[data-id="${t.id}"]`); if(el){ el.style.left=t.x+'px'; el.style.top=t.y+'px'; } }
  renderEdges();

function startLink(fromId, ev){
  const from=state.nodes.find(n=>n.id===fromId);
  const p=document.createElementNS(SVGNS,'path');
  p.setAttribute('class','edge temp-edge');
  p.setAttribute('marker-end','url(#arrowA)');
  edgeLayer.appendChild(p);
  const mv=e2=>{ const pt=canvasPoint(e2); const L=trimLine(centerOf(from),pt,52*(from.s||1),6); p.setAttribute('d',`M ${L.x1} ${L.y1} L ${L.x2} ${L.y2}`); };
  mv(ev);
  const move=e2=>mv(e2);
  const up=e2=>{
    document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',up);
    p.remove();
    const targetEl=document.elementFromPoint(e2.clientX,e2.clientY)?.closest('.node');
    if(targetEl){
      const tid=+targetEl.dataset.id;
      if(tid!==fromId && !state.edges.some(e=>e.from===fromId&&e.to===tid)){
        pushUndo();
        state.edges.push({id:++state.seq,from:fromId,to:tid,dash:false,heads:'end',w:2,label:''});
        persist();
      }
    }
    renderAll();
  };
  document.addEventListener('pointermove',move);
  document.addEventListener('pointerup',up);
}
document.addEventListener('keydown', ev=>{
  if(ev.target.tagName==='INPUT'||ev.target.tagName==='TEXTAREA') return;
  if(ev.key==='Delete'||ev.key==='Backspace'){ if(sel){ ev.preventDefault(); delSel(); } }
  if((ev.ctrlKey||ev.metaKey)&&ev.key.toLowerCase()==='z'){ ev.preventDefault(); undo(); }
  if((ev.ctrlKey||ev.metaKey)&&ev.key.toLowerCase()==='y'){ ev.preventDefault(); redo(); }
});

/* ============ SPEC DE AGENTE: normalização + auto-layout ============ */
function autoLayout(st){
  const depth={}; st.nodes.forEach(n=>depth[n.id]=0);
  for(let i=0;i<st.nodes.length+2;i++){
    let ch=false;
    for(const e of st.edges){ if(depth[e.to]!==undefined && depth[e.from]!==undefined && depth[e.to]<depth[e.from]+1){ depth[e.to]=depth[e.from]+1; ch=true; } }
    if(!ch) break;
  }
  const cols={};
  st.nodes.forEach(n=>{ (cols[depth[n.id]] ||= []).push(n); });
  for(const d of Object.keys(cols).map(Number).sort((a,b)=>a-b)){
    const arr=cols[d];
    arr.sort((a,b)=>String(a._box||'~').localeCompare(String(b._box||'~')));
    arr.forEach((n,i)=>{ n.x=130+d*235; n.y=150+i*145; });
  }
}
function normalizeSpec(spec){
  const st={seq:0,nodes:[],edges:[],boxes:[],arrows:[],texts:[]};
  const idMap={}, boxDefs=[];
  for(const b of spec.boxes||[]) boxDefs.push({key:b.id??b.label, label:b.label||String(b.id), color:(b.color&&/^#/.test(b.color))?b.color:BOX_COLORS[boxDefs.length%BOX_COLORS.length]});
  for(const n of spec.nodes||[]){
    const t=TYPE_INDEX[n.type]?n.type:'api';
    const nn={id:++st.seq,type:t,label:(n.label||TYPE_INDEX[t].n).slice(0,42),s:Math.max(0.6,Math.min(2.2,n.s||1)),st:n.style==='icon'?'icon':'card',x:n.x,y:n.y,_box:n.box};
    idMap[String(n.id??st.seq)]=nn.id;
    st.nodes.push(nn);
  }
  for(const e of spec.edges||[]){
    const f=idMap[String(e.from)], t=idMap[String(e.to)];
    if(f&&t) st.edges.push({id:++st.seq,from:f,to:t,label:(e.label||'').slice(0,40),dash:!!e.dash,heads:['end','both','none'].includes(e.heads)?e.heads:'end',w:Math.max(1,Math.min(6,e.w||2))});
  }
  if(st.nodes.some(n=>n.x==null||n.y==null)) autoLayout(st);
  for(const bd of boxDefs){
    const mem=st.nodes.filter(n=>String(n._box)===String(bd.key));
    if(!mem.length) continue;
    const minx=Math.min(...mem.map(n=>n.x))-36, miny=Math.min(...mem.map(n=>n.y))-48;
    st.boxes.push({id:++st.seq,x:minx,y:miny,label:bd.label,color:bd.color,
      w:Math.max(...mem.map(n=>n.x+nodeW(n)))-minx+36, h:Math.max(...mem.map(n=>n.y+nodeH(n)))-miny+34});
  }
  const maxY = st.nodes.length ? Math.max(...st.nodes.map(n=>n.y+nodeH(n))) : 200;
  let ty = maxY+70;
  for(const tx of spec.texts||[]){
    st.texts.push({id:++st.seq, x:tx.x??130, y:tx.y??(ty+=30)-30===ty-30?ty:ty, text:(tx.text||'').slice(0,300), size:Math.max(10,Math.min(34,tx.size||14))});
    if(tx.y==null) ty+= (tx.size||14)*1.6+10;
  }
  for(const n of st.nodes) delete n._box;
  return st;
}
function loadSpec(spec, name){
  pushUndo();
  state = normalizeSpec(spec);
  if(name||spec.name) document.getElementById('diagTitle').value = name||spec.name;
  sel=null; connSrc=null; persist(); renderAll();
}

/* ============ LINK COMPARTILHÁVEL (URL) ============ */
const b64u={
  enc(bytes){ let bin=''; for(let i=0;i<bytes.length;i+=8192) bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+8192)); return btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); },
  dec(s){ s=s.replace(/-/g,'+').replace(/_/g,'/'); while(s.length%4) s+='='; const bin=atob(s); const b=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) b[i]=bin.charCodeAt(i); return b; }
};
async function pipeStream(bytes,Ctor,fmt){
  const st=new Ctor(fmt), w=st.writable.getWriter();
  w.write(bytes); w.close();
  const rd=st.readable.getReader(), chunks=[];
  for(;;){ const {done,value}=await rd.read(); if(done) break; chunks.push(value); }
  let len=0; for(const c of chunks) len+=c.length;
  const out=new Uint8Array(len); let o=0;
  for(const c of chunks){ out.set(c,o); o+=c.length; }
  return out;
}
function currentDoc(){ return {format:'archstudio',version:3,name:document.getElementById('diagTitle').value,theme:theme(),font:fontId,state}; }
async function buildShareUrl(){
  const raw=new TextEncoder().encode(JSON.stringify(currentDoc()));
  let payload;
  try{ payload='z:'+b64u.enc(await pipeStream(raw,CompressionStream,'deflate-raw')); }
  catch{ payload='j:'+b64u.enc(raw); }
  return location.origin+location.pathname+'#d='+payload;
}
async function shareLink(btn){
  const url=await buildShareUrl();
  try{
    await navigator.clipboard.writeText(url);
    if(btn){ const t=btn.textContent; btn.textContent='✓ copiado!'; setTimeout(()=>btn.textContent=t,1600); }
  }catch{ prompt('Copie o link:', url); }
}
function loadDoc(doc){
  if(doc && doc.format==='archstudio' && doc.version>=3 && doc.state){
    pushUndo();
    state=doc.state;
    state.boxes=state.boxes||[]; state.arrows=state.arrows||[]; state.texts=state.texts||[];
    for(const n of state.nodes){ if(!n.label) n.label=(TYPE_INDEX[n.type]||{n:n.type}).n; if(!n.s) n.s=1; }
    for(const e of state.edges){ if(!e.id) e.id=++state.seq; }
    if(doc.name) document.getElementById('diagTitle').value=doc.name;
    if(doc.theme && doc.theme!==theme()) toggleTheme();
    if(doc.font && FONTS.some(f=>f.id===doc.font)) setFont(doc.font);
    sel=null; connSrc=null; persist(); renderAll();
    return true;
  }
  if(doc && Array.isArray(doc.nodes)){ loadSpec(doc); return true; }
  return false;
}
async function loadFromUrl(){
  try{
    const d=new URLSearchParams(location.hash.slice(1)).get('d');
    if(d){
      const kind=d.slice(0,2), body=d.slice(2);
      const bytes = kind==='z:' ? await pipeStream(b64u.dec(body),DecompressionStream,'deflate-raw') : b64u.dec(kind==='j:'?body:d);
      if(loadDoc(JSON.parse(new TextDecoder().decode(bytes))))
        history.replaceState(null,'',location.pathname+location.search);
      return;
    }
    const src=new URLSearchParams(location.search).get('src');
    if(src) loadDoc(await (await fetch(src)).json());
  }catch(e){ console.warn('ArchStudio: não consegui carregar o diagrama da URL.', e); }
}

/* ============ SALVAR / CARREGAR ============ */
function downloadBlob(blob,name){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),3000);
}
function saveFile(){
  const name=document.getElementById('diagTitle').value||'diagrama';
  const doc={format:'archstudio',version:3,name,theme:theme(),savedAt:new Date().toISOString(),state};
  downloadBlob(new Blob([JSON.stringify(doc,null,2)],{type:'application/json'}), name.replace(/[^\w\-]+/g,'-').toLowerCase()+'.archstudio.json');
}
document.getElementById('fileInput').addEventListener('change', ev=>{
  const file=ev.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const doc=JSON.parse(reader.result);
      if(doc.format!=='archstudio'){
        if(Array.isArray(doc.nodes)){ loadSpec(doc); ev.target.value=''; return; }
        throw 0;
      }
      pushUndo();
      if(doc.version>=3 && doc.state){ state=doc.state; }
      else { state={seq:doc.seq||0,nodes:doc.nodes||[],edges:(doc.edges||[]).map(e=>({id:++state.seq,dash:false,heads:'end',w:2,label:'',...e})),boxes:[],arrows:[],texts:[]}; }
      state.boxes=state.boxes||[]; state.arrows=state.arrows||[]; state.texts=state.texts||[];
      for(const n of state.nodes){ if(!n.label) n.label=(TYPE_INDEX[n.type]||{n:n.type}).n; if(!n.s) n.s=1; }
      for(const e of state.edges){ if(!e.id) e.id=++state.seq; }
      document.getElementById('diagTitle').value=doc.name||'Diagrama carregado';
      if(doc.theme&&doc.theme!==theme()) toggleTheme();
      sel=null; persist(); renderAll();
    }catch{ alert('Arquivo inválido: esperado um .archstudio.json salvo pelo ArchStudio.'); }
    ev.target.value='';
  };
  reader.readAsText(file);
});

/* ============ EXPORTAR (SVG e PNG, respeitando o tema) ============ */
function svgEscape(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function wrapLabel(s,max){
  const words=s.split(' '),lines=[];let cur='';
  for(const w of words){ if((cur+' '+w).trim().length>max){ if(cur)lines.push(cur); cur=w; } else cur=(cur+' '+w).trim(); }
  if(cur)lines.push(cur);
  return lines.slice(0,2);
}
function buildSvg(fontCss){
  const all=[...state.nodes.map(n=>({x:n.x,y:n.y,x2:n.x+nodeW(n),y2:n.y+nodeH(n)})),
             ...state.boxes.map(b=>({x:b.x,y:b.y,x2:b.x+b.w,y2:b.y+b.h})),
             ...state.arrows.map(a=>({x:Math.min(a.x1,a.x2),y:Math.min(a.y1,a.y2),x2:Math.max(a.x1,a.x2),y2:Math.max(a.y1,a.y2)})),
             ...state.texts.map(t=>({x:t.x,y:t.y,x2:t.x+220,y2:t.y+30}))];
  if(!all.length) return null;
  const dark=theme()==='dark';
  const P=dark
    ? {bg:'#0e1017',node:'#1a1d2e',border:'#2a2f47',ink:'#e6e8f2',dim:'#8f94ad',grid:'rgba(166,121,255,0.055)',edge:'#6b72a3',accent:'#a679ff'}
    : {bg:'#f7f8fc',node:'#ffffff',border:'#d5d9ea',ink:'#1d2030',dim:'#6a7089',grid:'rgba(90,70,180,0.09)',edge:'#8a90b8',accent:'#7c4dff'};
  const PAD=90;
  const minX=Math.min(...all.map(o=>o.x))-PAD, minY=Math.min(...all.map(o=>o.y))-PAD-40;
  const maxX=Math.max(...all.map(o=>o.x2))+PAD, maxY=Math.max(...all.map(o=>o.y2))+PAD;
  const W=Math.max(900,maxX-minX), H=Math.max(560,maxY-minY);
  const ox=-minX, oy=-minY;
  const title=svgEscape(document.getElementById('diagTitle').value||'Arquitetura');
  let s=`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" font-family="${curFont().css.replace(/\x27/g,"&#39;")}">`;
  s+=`<defs><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="${P.edge}"/></marker>
  <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M 28 0 L 0 0 0 28" fill="none" stroke="${P.grid}" stroke-width="1"/></pattern>${fontCss||''}</defs>`;
  s+=`<rect width="${W}" height="${H}" fill="${P.bg}"/><rect width="${W}" height="${H}" fill="url(#grid)"/>`;
  s+=`<text x="28" y="42" font-size="24" font-weight="700" fill="${P.ink}">${title}</text>`;
  s+=`<text x="28" y="64" font-size="12" fill="${P.dim}">${new Date().toLocaleDateString('pt-BR')} · ArchStudio</text>`;
  /* caixas */
  for(const b of state.boxes){
    s+=`<rect x="${b.x+ox}" y="${b.y+oy}" width="${b.w}" height="${b.h}" rx="14" fill="${b.color}0d" stroke="${b.color}" stroke-width="2" stroke-dasharray="10 7"/>`;
    s+=`<rect x="${b.x+ox+12}" y="${b.y+oy-11}" width="${b.label.length*7.2+18}" height="20" rx="5" fill="${P.bg}"/>`;
    s+=`<text x="${b.x+ox+21}" y="${b.y+oy+3.5}" font-size="11.5" font-weight="700" fill="${b.color}" font-family="Consolas, monospace">${svgEscape(b.label)}</text>`;
  }
  /* conexões + setas livres */
  const lineSvg=(x1,y1,x2,y2,o)=>{
    const dash=o.dash?` stroke-dasharray="8 6"`:'';
    const me=(o.heads==='end'||o.heads==='both')?` marker-end="url(#ar)"`:'';
    const ms=o.heads==='both'?` marker-start="url(#ar)"`:'';
    let out=`<path d="M ${x1} ${y1} L ${x2} ${y2}" stroke="${P.edge}" stroke-width="${o.w||2}" fill="none"${dash}${me}${ms}/>`;
    if(o.label) out+=`<text x="${(x1+x2)/2}" y="${(y1+y2)/2-8}" font-size="11" fill="${P.ink}" text-anchor="middle" paint-order="stroke" stroke="${P.bg}" stroke-width="4">${svgEscape(o.label)}</text>`;
    return out;
  };
  for(const e of state.edges){
    const a=state.nodes.find(n=>n.id===e.from), b=state.nodes.find(n=>n.id===e.to);
    if(!a||!b) continue;
    const ca=centerOf(a), cb=centerOf(b);
    const L=trimLine({x:ca.x+ox,y:ca.y+oy},{x:cb.x+ox,y:cb.y+oy},56*(a.s||1),70*(b.s||1));
    s+=lineSvg(L.x1,L.y1,L.x2,L.y2,e);
  }
  for(const a of state.arrows) s+=lineSvg(a.x1+ox,a.y1+oy,a.x2+ox,a.y2+oy,a);
  /* nós */
  for(const n of state.nodes){
    const def=TYPE_INDEX[n.type]||{i:'hexagon',color:'gen'};
    const col=catColor(def.color), sc=n.s||1, ic=n.st==='icon';
    const x=n.x+ox, y=n.y+oy, w=nodeW(n), h=nodeH(n), cx=x+w/2;
    if(ic){
      /* modo só ícone: sem cartão — ícone grande + nome, fiel ao canvas */
      s+=`<g transform="translate(${cx-21*sc},${y+4*sc}) scale(${1.75*sc})" color="${col}" stroke="currentColor" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${ICONS[def.i]||ICONS.hexagon}</g>`;
      const lines=wrapLabel(n.label, 16);
      lines.forEach((ln,i)=>{ s+=`<text x="${cx}" y="${y+(58+i*14)*sc}" font-size="${12*sc}" font-weight="500" fill="${P.ink}" text-anchor="middle">${svgEscape(ln)}</text>`; });
    } else {
      s+=`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${11*sc}" fill="${P.node}" stroke="${P.border}" stroke-width="1"/>`;
      s+=`<rect x="${x}" y="${y}" width="${w}" height="3.5" rx="1.75" fill="${col}"/>`;
      s+=`<g transform="translate(${cx-15*sc},${y+8*sc}) scale(${1.25*sc})" color="${col}" stroke="currentColor" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${ICONS[def.i]||ICONS.hexagon}</g>`;
      const lines=wrapLabel(n.label, 19);
      lines.forEach((ln,i)=>{ s+=`<text x="${cx}" y="${y+(50+i*12)*sc}" font-size="${10.5*sc}" fill="${P.ink}" text-anchor="middle">${svgEscape(ln)}</text>`; });
    }
  }
  /* textos livres */
  for(const t of state.texts){
    const lines=t.text.split('\n');
    lines.forEach((ln,i)=>{ s+=`<text x="${t.x+ox}" y="${t.y+oy+t.size*(i+0.9)}" font-size="${t.size}" fill="${P.ink}">${svgEscape(ln)}</text>`; });
  }
  s+='</svg>';
  return {svg:s,W,H};
}
async function fontEmbedCss(){
  const f=curFont();
  if(!f.g) return '';
  if(fontCache[f.id]!==undefined) return fontCache[f.id];
  try{
    const css=await (await fetch('https://fonts.googleapis.com/css2?family='+f.g+'&display=swap')).text();
    let out=css;
    const urls=[...css.matchAll(/url\((https:[^)]+?\.woff2)\)/g)].map(m=>m[1]).slice(0,4);
    for(const u of urls){
      const buf=new Uint8Array(await (await fetch(u)).arrayBuffer());
      let bin=''; for(let i=0;i<buf.length;i+=8192) bin+=String.fromCharCode.apply(null,buf.subarray(i,i+8192));
      out=out.split(u).join('data:font/woff2;base64,'+btoa(bin));
    }
    fontCache[f.id]='<style>'+out+'</style>';
  }catch{ fontCache[f.id]=''; }
  return fontCache[f.id];
}
async function exportSvg(){
  const built=buildSvg(await fontEmbedCss());
  if(!built){ alert('O canvas está vazio.'); return; }
  const name=(document.getElementById('diagTitle').value||'arquitetura').replace(/[^\w\-]+/g,'-').toLowerCase();
  downloadBlob(new Blob([built.svg],{type:'image/svg+xml'}), name+'.svg');
}
async function exportPng(){
  const built=buildSvg(await fontEmbedCss());
  if(!built){ alert('O canvas está vazio — adicione componentes antes de exportar.'); return; }
  const {svg,W,H}=built;
  const url=URL.createObjectURL(new Blob([svg],{type:'image/svg+xml;charset=utf-8'}));
  const img=new Image();
  img.onload=()=>{
    const scale=2,c=document.createElement('canvas');
    c.width=W*scale; c.height=H*scale;
    const ctx=c.getContext('2d'); ctx.scale(scale,scale); ctx.drawImage(img,0,0);
    URL.revokeObjectURL(url);
    const name=(document.getElementById('diagTitle').value||'arquitetura').replace(/[^\w\-]+/g,'-').toLowerCase();
    c.toBlob(b=>downloadBlob(b,name+'.png'),'image/png');
  };
  img.onerror=()=>{ URL.revokeObjectURL(url); alert('Falha ao renderizar o PNG.'); };
  img.src=url;
}

 spec:{boxes:[{id:'op',label:'Data Center on-premise',color:'#9aa3b5'},{id:'cl',label:'Nuvem',color:'#ff9900'}],nodes:[{id:'u',type:'user'},{id:'a',type:'api',label:'API na nuvem',box:'cl'},{id:'ch',type:'cache',label:'Cache (dados do legado)',box:'cl'},{id:'v',type:'vpn',label:'VPN / Direct Connect'},{id:'fw',type:'firewall',box:'op'},{id:'srv',type:'server',label:'Sistema core',box:'op'},{id:'do',type:'dbonprem',label:'Banco regulado',box:'op'},{id:'ad',type:'ad',box:'op'}],edges:[{from:'u',to:'a'},{from:'a',to:'ch',label:'1º'},{from:'a',to:'v',label:'miss / escrita'},{from:'v',to:'fw',label:'túnel privado',dash:true},{from:'fw',to:'srv'},{from:'srv',to:'do'},{from:'a',to:'ad',label:'auth corporativo',dash:true}]}}
];

/* ============ DO DESENHO À INFRA (IaC) ============ */
function exportSpec(){
  const boxOf=n=>{ const c=centerOf(n); const b=state.boxes.find(b=>c.x>=b.x&&c.x<=b.x+b.w&&c.y>=b.y&&c.y<=b.y+b.h); return b?b.id:undefined; };
  return {
    name: document.getElementById('diagTitle').value||'Arquitetura',
    boxes: state.boxes.map(b=>({id:b.id,label:b.label})),
    nodes: state.nodes.map(n=>{ const bx=boxOf(n); return {id:n.id,type:n.type,label:n.label,...(bx!==undefined?{box:bx}:{})}; }),
    edges: state.edges.map(e=>({from:e.from,to:e.to,...(e.label?{label:e.label}:{}),...(e.dash?{dash:true}:{})})),
    texts: state.texts.map(t=>({text:t.text}))
  };
}
function iacPrompt(kind){
  const alvo = kind==='cdk' ? 'AWS CDK v2 em TypeScript' : 'Terraform (HCL, provider AWS)';
  return [
`Você é um engenheiro de infraestrutura sênior. Abaixo está um diagrama de arquitetura VALIDADO, no formato ArchStudio (JSON). Gere a infraestrutura como código em ${alvo} a partir dele.`,
`Regras:`,
`1. Cada node vira o recurso equivalente (apigw→API Gateway, lambda/funcao→Lambda, sqs/queue→SQS, dlq→SQS dead-letter c/ redrive, sns→SNS, eventbridge→EventBus+Rules, kinesis/stream→Kinesis, s3/storagegen→S3, rds/db→RDS Postgres, aurora→Aurora, dynamodb→DynamoDB, cache/elasticache→Redis, ecs/fargate/container/api→Fargate+ALB, eks/k8s→EKS, ec2/vm→EC2, alb/nlb/lb→ELB, cloudfront/cdngen→CloudFront, route53→Route53, waf→WAFv2, cognito/auth→Cognito, secretsmgr→Secrets Manager, kms→KMS, cloudwatch/obs→alarmes+dashboard, xray→tracing ativo, ses→SES, vpc→VPC 2 AZs, stepfn→Step Functions, sched→agendamento).`,
`2. As EDGES definem o wiring e o IAM de menor privilégio: api→fila = permissão de envio; fila→worker = event source mapping; serviço→banco = grant conforme o label; s3→fila/lambda = notificação de evento; edge tracejada (dash) = caminho assíncrono.`,
`3. Tipos de cliente/on-premise (user, browser, mobile, iot, partner, server, mainframe, dbonprem, ad, firewall, dc) NÃO viram recurso — são contexto. "extern" vira endpoint + secret. "outbox" é padrão de aplicação: comentário/tabela, não serviço.`,
`4. Entregue um projeto completo e compilável, nomes derivados dos labels, criptografia em repouso, tags, e termine com duas listas curtas: "Decisões assumidas" e "Pendências humanas" (domínios, segredos, tamanhos).`,
`5. Trate os "texts" do diagrama como requisitos.`,
``,
`DIAGRAMA (ArchStudio):`,
JSON.stringify(exportSpec(),null,1)
].join('\n');
}
async function copyIac(kind,btn){
  if(!state.nodes.length){ alert('O canvas está vazio — desenhe (ou carregue) a arquitetura antes de gerar a infra.'); return; }
  const txt=iacPrompt(kind);
  try{ await navigator.clipboard.writeText(txt); const t=btn.textContent; btn.textContent='✓ copiado!'; setTimeout(()=>btn.textContent=t,1600); }
  catch{ prompt('Copie o prompt:', txt); }
}

TIPOS DE COMPONENTE (campo "type"):

    <div style="margin-top:12px"><button class="pbtn" style="background:var(--accent);color:#fff;border:none;font-weight:700" onclick="navigator.clipboard.writeText(this.parentElement.nextElementSibling.textContent).then(()=>{this.textContent='✓ copiado!'})">⧉ Copiar schema para o agente</button></div>
    <pre class="schema">${schema.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</pre>

/* ============ INIT ============ */
(function init(){
  renderPalette();
  const saved=store.get('as_doc');
  if(saved){
    try{
      const doc=JSON.parse(saved);
      if(doc.version>=3 && doc.state) state=doc.state;
      else if(doc.nodes) state={seq:doc.seq||0,nodes:doc.nodes,edges:(doc.edges||[]).map((e,i)=>({id:(doc.seq||0)+i+1,dash:false,heads:'end',w:2,label:'',...e})),boxes:[],arrows:[],texts:[]};
      if(doc.nodes&&!(doc.version>=3)) state.seq=(doc.seq||0)+(doc.edges||[]).length+1;
      state.boxes=state.boxes||[]; state.arrows=state.arrows||[]; state.texts=state.texts||[];
      for(const n of state.nodes){ if(!n.label) n.label=(TYPE_INDEX[n.type]||{n:n.type}).n; if(!n.s) n.s=1; }
      if(doc.name) document.getElementById('diagTitle').value=doc.name;
      if(doc.theme==='light') toggleTheme();
    }catch{}
  }
  document.getElementById('fontSel').innerHTML = FONTS.map(f=>`<option value="${f.id}">${f.n}</option>`).join('');
  try{ const d=JSON.parse(store.get('as_doc')||'{}'); if(d.font) fontId=d.font; }catch{}
  setFont(fontId);
  setZoom(1);
  renderAll();
  loadFromUrl();
})();
</script>
